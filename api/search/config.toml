[playground]
name = "Search API"
endpoint = "https://miklium.vercel.app/api/search"
path = "/api/search"
method = "POST"
docs_anchor = "search-api-documentation"

[[playground.inputs]]
id = "search"
label = "Queries (Comma separated, max 3)"
type = "text"
placeholder = "iPhone 17, Apple Vision"
required = true

[[playground.inputs]]
id = "maxSmallSnippets"
label = "Max Small Snippets"
type = "number"
default = 5

[[playground.inputs]]
id = "maxLargeSnippets"
label = "Max Large Snippets"
type = "number"
default = 2

[[playground.inputs]]
id = "maxLargeSnippetSymbols"
label = "Max Characters per Snippet"
type = "number"
default = 4500

[test]
endpoint = "/api/search"
method = "POST"

[[test.cases]]
name = "Basic search"
expected_key = "success"
expected_value = true

[test.cases.payload]
search = ["MIKLIUM"]
maxSmallSnippets = 2
maxLargeSnippets = 1

[[test.cases]]
name = "Multiple terms"
expected_key = "success"
expected_value = true

[test.cases.payload]
search = ["Apple", "Shortcuts"]
maxSmallSnippets = 1
maxLargeSnippets = 1