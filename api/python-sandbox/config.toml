[playground]
name = "Python Sandbox API"
endpoint = "https://miklium.vercel.app/api/python-sandbox"
path = "/api/python-sandbox"
method = "POST"
docs_anchor = "python-sandbox-api-documentation"

[[playground.inputs]]
id = "code"
label = "Python Code"
type = "textarea"
placeholder = "print('Hello MIKLIUM!')"
required = true

[[playground.inputs]]
id = "stdin"
label = "Stdin (Comma separated)"
type = "text"
placeholder = "input1, input2"

[[playground.inputs]]
id = "timeout"
label = "Timeout (Seconds)"
type = "number"
min = 0.5
max = 40
default = 20

[test]
endpoint = "/api/python-sandbox"
method = "POST"

[[test.cases]]
name = "Basic print"
expected_key = "success"
expected_value = true

[test.cases.payload]
code = "print('Hello, MIKLIUM!')"

[[test.cases]]
name = "Math expression"
expected_key = "success"
expected_value = true

[test.cases.payload]
code = "print(2 + 2)"

[[test.cases]]
name = "Empty code returns error"
expected_key = "success"
expected_value = false

[test.cases.payload]
code = ""