[playground]
name = "YouTube Transcript API"
endpoint = "https://miklium.vercel.app/api/youtube-transcript"
path = "/api/youtube-transcript"
method = "POST"
docs_anchor = "youtube-transcript-api-documentation"

[[playground.inputs]]
id = "url"
label = "YouTube URL"
type = "text"
placeholder = "https://youtu.be/..."
required = true

[[playground.inputs]]
id = "removeTimestamps"
label = "Remove Timestamps"
type = "checkbox"
default = false

[[playground.inputs]]
id = "includeInfo"
label = "Include Video Info"
type = "checkbox"
default = false

[test]
endpoint = "/api/youtube-transcript"
method = "POST"

[[test.cases]]
name = "Valid YouTube video"
expected_key = "success"
expected_value = true

[test.cases.payload]
url = "https://youtu.be/Qz8u00pX738"

[[test.cases]]
name = "Invalid video URL"
expected_key = "success"
expected_value = false

[test.cases.payload]
url = "https://youtu.be/invalidvideo999"