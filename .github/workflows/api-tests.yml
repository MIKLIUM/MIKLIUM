name: "API Tests"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 6 */3 * *'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apis: ${{ steps.filter.outputs.apis }}
      changed_projects: ${{ steps.detect.outputs.changed_projects }}
      is_schedule: ${{ github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'schedule'
        with:
          filters: |
            apis:
              - 'api/**'

      - name: Detect changed API projects
        id: detect
        if: github.event_name != 'schedule' && steps.filter.outputs.apis == 'true'
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- api/ \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "changed_projects=$CHANGED" >> "$GITHUB_OUTPUT"

  wait-for-deploy:
    needs: changes
    if: >
      github.event_name == 'schedule' ||
      needs.changes.outputs.apis == 'true'
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.resolve.outputs.deploy_url }}
    steps:
      - name: Wait for Vercel deployment via GitHub Deployments API
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "deploy_url=https://miklium.vercel.app" >> "$GITHUB_OUTPUT"
            echo "Schedule run, using production URL"
            exit 0
          fi

          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Waiting for deployment of commit $COMMIT_SHA..."

          MAX_ATTEMPTS=10
          SLEEP_INTERVAL=10

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i/$MAX_ATTEMPTS..."

            DEPLOYMENTS=$(gh api \
              "repos/${{ github.repository }}/deployments?sha=$COMMIT_SHA&per_page=10" \
              --jq '.[].id' 2>/dev/null || echo "")

            if [ -z "$DEPLOYMENTS" ]; then
              echo "  No deployments found yet"
              sleep $SLEEP_INTERVAL
              continue
            fi

            for DEPLOY_ID in $DEPLOYMENTS; do
              STATUS_DATA=$(gh api \
                "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses?per_page=1" \
                2>/dev/null || echo "[]")

              STATE=$(echo "$STATUS_DATA" | jq -r '.[0].state // empty')
              ENV_URL=$(echo "$STATUS_DATA" | jq -r '.[0].environment_url // empty')
              TARGET_URL=$(echo "$STATUS_DATA" | jq -r '.[0].target_url // empty')

              echo "  Deployment $DEPLOY_ID: state=$STATE"

              if [ "$STATE" == "success" ]; then
                DEPLOY_URL="${ENV_URL:-$TARGET_URL}"

                if [ -n "$DEPLOY_URL" ] && [ "$DEPLOY_URL" != "null" ]; then
                  echo "Deployment ready: $DEPLOY_URL"
                  echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              fi

              if [ "$STATE" == "failure" ] || [ "$STATE" == "error" ]; then
                echo "Deployment $DEPLOY_ID failed with state: $STATE"
                exit 1
              fi
            done

            sleep $SLEEP_INTERVAL
          done

          echo "Timed out waiting for deployment"
          exit 1

  test:
    needs: [changes, wait-for-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests toml

      - name: Run API tests
        env:
          BASE_URL: ${{ needs.wait-for-deploy.outputs.deploy_url }}
          IS_SCHEDULE: ${{ needs.changes.outputs.is_schedule }}
          CHANGED_PROJECTS: ${{ needs.changes.outputs.changed_projects }}
          VERCEL_AUTOMATION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS }}
        run: python .github/scripts/api-tests.py

  test-status:
    runs-on: ubuntu-latest
    needs: [changes, wait-for-deploy, test]
    if: always()
    steps:
      - name: API Test Status
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ "${{ needs.test.result }}" == "success" ]; then
              echo "Scheduled API tests passed"
              exit 0
            fi
            echo "Scheduled API tests failed"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.apis }}" != "true" ]; then
            echo "No API changes, skipping tests"
            exit 0
          fi
          if [ "${{ needs.wait-for-deploy.result }}" == "failure" ]; then
            echo "Vercel deployment failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "API tests passed"
            exit 0
          fi
          if [ "${{ needs.test.result }}" == "skipped" ]; then
            echo "API tests skipped"
            exit 0
          fi
          echo "API tests failed"
          exit 1